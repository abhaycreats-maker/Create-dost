<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Studio</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

header{
width:100%;
padding:20px;
text-align:center;
background:#020617;
border-bottom:1px solid #1e293b;
}

header h1{
font-size:28px;
font-weight:bold;
letter-spacing:1px;
}

.container{
width:95%;
max-width:1000px;
margin-top:30px;
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

.panel{
background:#020617;
padding:20px;
border-radius:12px;
border:1px solid #1e293b;
}

.panel h2{
margin-bottom:15px;
font-size:20px;
}

.controls{
display:flex;
flex-direction:column;
gap:12px;
}

input, button{
padding:10px;
border-radius:8px;
border:none;
font-size:14px;
}

input[type="file"]{
background:#1e293b;
color:white;
}

input[type="text"]{
background:#1e293b;
color:white;
}

button{
background:#6366f1;
color:white;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

button:hover{
background:#4f46e5;
}

canvas{
width:100%;
border-radius:10px;
background:#111827;
}

footer{
margin-top:40px;
padding:20px;
font-size:14px;
opacity:.6;
}
</style>
</head>

<body>

<header>
<h1>Thumbnail Studio</h1>
</header>

<div class="container">

<div class="panel">
<h2>Controls</h2>

<div class="controls">

<input type="file" id="upload">

<input type="text" id="textInput" placeholder="Enter thumbnail text">

<input type="range" id="fontSize" min="20" max="120" value="60">

<button onclick="addText()">Add Text</button>

<button onclick="downloadImage()">Download Thumbnail</button>

</div>
</div>

<div class="panel">
<h2>Preview</h2>

<canvas id="canvas" width="1280" height="720"></canvas>

</div>

</div>

<footer>
Simple AI Thumbnail Studio UI
</footer>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let image = new Image();

document.getElementById("upload").addEventListener("change", function(e){

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = function(event){
image.src = event.target.result;
};

reader.readAsDataURL(file);

});

image.onload = function(){
ctx.drawImage(image,0,0,canvas.width,canvas.height);
};

function addText(){

const text = document.getElementById("textInput").value;
const size = document.getElementById("fontSize").value;

ctx.drawImage(image,0,0,canvas.width,canvas.height);

ctx.font = size + "px Impact";
ctx.fillStyle = "white";
ctx.strokeStyle = "black";
ctx.lineWidth = 8;
ctx.textAlign = "center";

ctx.strokeText(text, canvas.width/2, canvas.height-120);
ctx.fillText(text, canvas.width/2, canvas.height-120);

}

function downloadImage(){

const link = document.createElement("a");
link.download = "thumbnail.png";
link.href = canvas.toDataURL();
link.click();

}
</script>

</body>
  </html>
